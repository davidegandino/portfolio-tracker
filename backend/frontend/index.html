<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Tracker - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e40af',
                        secondary: '#059669',
                        accent: '#7c3aed'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">📊 Portfolio Tracker</h1>
            <p class="text-gray-400">Gestisci il tuo portafoglio investimenti</p>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="bg-white/10 backdrop-blur-lg rounded-2xl p-8 shadow-2xl border border-white/20">
            <h2 class="text-2xl font-bold text-white mb-6">Accedi</h2>
            <form onsubmit="handleLogin(event)">
                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Email</label>
                    <input type="email" id="loginEmail" required 
                        class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary"
                        placeholder="admin@portfolio.com">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Password</label>
                    <input type="password" id="loginPassword" required 
                        class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary"
                        placeholder="••••••••">
                </div>
                <div id="totpField" class="mb-4 hidden">
                    <label class="block text-gray-300 mb-2">Codice 2FA</label>
                    <input type="text" id="loginTotp" maxlength="6"
                        class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary text-center text-2xl tracking-widest"
                        placeholder="123456">
                </div>
                <button type="submit" 
                    class="w-full bg-primary hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-all duration-200 transform hover:scale-105">
                    Accedi
                </button>
            </form>
            <div class="mt-6 text-center">
                <button onclick="showRegister()" class="text-gray-400 hover:text-white transition-colors">
                    Non hai un account? Registrati
                </button>
            </div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="hidden bg-white/10 backdrop-blur-lg rounded-2xl p-8 shadow-2xl border border-white/20">
            <h2 class="text-2xl font-bold text-white mb-6">Registrati</h2>
            <form onsubmit="handleRegister(event)">
                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Email</label>
                    <input type="email" id="regEmail" required 
                        class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary"
                        placeholder="tua@email.com">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Password</label>
                    <input type="password" id="regPassword" required minlength="6"
                        class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary"
                        placeholder="Minimo 6 caratteri">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Conferma Password</label>
                    <input type="password" id="regPasswordConfirm" required minlength="6"
                        class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary"
                        placeholder="Conferma password">
                </div>
                <button type="submit" 
                    class="w-full bg-secondary hover:bg-green-700 text-white font-semibold py-3 rounded-lg transition-all duration-200 transform hover:scale-105">
                    Registrati
                </button>
            </form>
            <div class="mt-6 text-center">
                <button onclick="showLogin()" class="text-gray-400 hover:text-white transition-colors">
                    Hai già un account? Accedi
                </button>
            </div>
        </div>

        <!-- TOTP Setup Modal -->
        <div id="totpModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-50">
            <div class="bg-slate-800 rounded-2xl p-8 max-w-md w-full border border-white/20">
                <h3 class="text-2xl font-bold text-white mb-4">🔐 Configura 2FA</h3>
                <p class="text-gray-400 mb-6">Scansiona il QR code con Google Authenticator o Authy</p>
                
                <div id="qrCode" class="bg-white p-4 rounded-lg mb-6 flex justify-center"></div>
                
                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Secret Key (copia se non puoi scansionare)</label>
                    <input type="text" id="totpSecret" readonly 
                        class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white font-mono text-center">
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-300 mb-2">Inserisci il codice a 6 cifre</label>
                    <input type="text" id="totpVerifyCode" maxlength="6"
                        class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white text-center text-2xl tracking-widest"
                        placeholder="123456">
                </div>
                
                <button onclick="verifyTOTP()" 
                    class="w-full bg-accent hover:bg-purple-700 text-white font-semibold py-3 rounded-lg transition-all duration-200">
                    Attiva 2FA
                </button>
                <button onclick="closeTOTPModal()" 
                    class="w-full mt-3 bg-white/10 hover:bg-white/20 text-white font-semibold py-3 rounded-lg transition-all duration-200">
                    Annulla
                </button>
            </div>
        </div>

        <!-- Notifications -->
        <div id="notification" class="fixed top-4 right-4 px-6 py-4 rounded-lg shadow-lg transform translate-x-full transition-transform duration-300 z-50">
            <span id="notifMessage"></span>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let token = null;

        function showNotification(message, type = 'error') {
            const notif = document.getElementById('notification');
            const msg = document.getElementById('notifMessage');
            msg.textContent = message;
            notif.className = `fixed top-4 right-4 px-6 py-4 rounded-lg shadow-lg transform transition-transform duration-300 z-50 ${
                type === 'success' ? 'bg-green-600' : 'bg-red-600'
            }`;
            notif.classList.remove('translate-x-full');
            setTimeout(() => notif.classList.add('translate-x-full'), 3000);
        }

        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
        }

        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }

        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const totp = document.getElementById('loginTotp').value;

            const formData = new FormData();
            formData.append('username', email);
            formData.append('password', password);
            if (totp) formData.append('totp', totp);

            try {
                const res = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (res.status === 401 && data.detail === 'TOTP_REQUIRED') {
                    document.getElementById('totpField').classList.remove('hidden');
                    document.getElementById('loginTotp').focus();
                    showNotification('Inserisci il codice 2FA', 'error');
                    return;
                }

                if (!res.ok) throw new Error(data.detail || 'Login fallito');

                token = data.access_token;
                localStorage.setItem('token', token);
                showNotification('Login riuscito!', 'success');
                setTimeout(() => window.location.href = '/dashboard', 1000);
            } catch (err) {
                showNotification(err.message, 'error');
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regPasswordConfirm').value;

            if (password !== confirm) {
                showNotification('Le password non corrispondono', 'error');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.detail || 'Registrazione fallita');

                showNotification('Registrazione riuscita! Ora accedi.', 'success');
                setTimeout(() => showLogin(), 1000);
            } catch (err) {
                showNotification(err.message, 'error');
            }
        }

        async function setupTOTP() {
            try {
                const res = await fetch(`${API_URL}/api/auth/totp/setup`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.detail || 'Setup fallito');

                document.getElementById('qrCode').innerHTML = `<img src="${data.qr_code}" alt="QR Code" class="w-48 h-48">`;
                document.getElementById('totpSecret').value = data.secret;
                document.getElementById('totpModal').classList.remove('hidden');
            } catch (err) {
                showNotification(err.message, 'error');
            }
        }

        async function verifyTOTP() {
            const code = document.getElementById('totpVerifyCode').value;
            if (code.length !== 6) {
                showNotification('Inserisci un codice a 6 cifre', 'error');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/api/auth/totp/verify`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ code })
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.detail || 'Codice non valido');

                showNotification('2FA attivato con successo!', 'success');
                closeTOTPModal();
            } catch (err) {
                showNotification(err.message, 'error');
            }
        }

        function closeTOTPModal() {
            document.getElementById('totpModal').classList.add('hidden');
        }

        // Check if already logged in
        window.onload = () => {
            const savedToken = localStorage.getItem('token');
            if (savedToken) {
                token = savedToken;
                fetch(`${API_URL}/api/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(res => {
                    if (res.ok) window.location.href = '/dashboard';
                }).catch(() => localStorage.removeItem('token'));
            }
        };
    </script>
</body>
</html>
